{% load i18n %}
<div>
    <h1 class="page-heading text-dark fw-bold fs-2 mb-1">{{ page_title }}</h1>
    {% if parent_page %}
        <ul class="breadcrumb breadcrumb-separatorless fw-semibold fs-7 mb-0">
            <li class="breadcrumb-item text-muted">
                {% if parent_url %}<a href="{{ parent_url }}" class="text-muted text-hover-primary">{{ parent_page }}</a>{% else %}{{ parent_page }}{% endif %}
            </li>
            <li class="breadcrumb-item">
                <span class="bullet bullet-dot bg-gray-400 w-5px h-2px"></span>
            </li>
            <li class="breadcrumb-item text-muted">{{ page_title }}</li>
        </ul>
    {% endif %}
</div>
